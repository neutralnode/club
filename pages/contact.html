<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="description" content="Contact AI Girlfriend Club — review questions, corrections, story submissions, press inquiries."/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — AI Girlfriend Club</title>
    <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://www.aigirlfriendclub.com/pages/contact.html"/>
  <meta property="og:title" content="Contact — AI Girlfriend Club"/>
  <meta property="og:description" content="Contact AI Girlfriend Club — review questions, corrections, story submissions, press inquiries."/>
  <meta property="og:site_name" content="AI Girlfriend Club"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>
    :root{--plum:#24112D;--aubergine:#3A1848;--ivory:#F8F1E8;--gold:#D29A63;--blush:#F1C7CF;--dusty:#C97C8F;--champagne:#E8D7C5;--font-display:Georgia,'Times New Roman',serif;--font-body:'Palatino Linotype',Palatino,Georgia,serif;--font-ui:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--radius-sm:6px;--max-w:680px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--plum);color:var(--ivory);font-family:var(--font-body);font-size:17px;line-height:1.8;-webkit-font-smoothing:antialiased;}
    a{color:var(--gold);}
    nav{height:68px;background:rgba(36,17,45,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(241,199,207,0.08);display:flex;align-items:center;}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1100px;margin:0 auto;padding:0 24px;}
    .nav-brand-name{font-family:var(--font-display);font-size:18px;color:var(--ivory);text-decoration:none;}
    .content{padding:72px 24px;max-width:var(--max-w);margin:0 auto;}
    h1{font-family:var(--font-display);font-size:clamp(28px,4vw,42px);font-weight:normal;font-style:italic;color:var(--ivory);margin-bottom:16px;}
    .intro{color:rgba(248,241,232,0.62);margin-bottom:48px;}
    .form-group{margin-bottom:24px;}
    label{display:block;font-family:var(--font-ui);font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--dusty);margin-bottom:10px;}
    input,select,textarea{width:100%;background:rgba(36,17,45,0.6);border:1px solid rgba(201,124,143,0.2);border-radius:var(--radius-sm);color:var(--ivory);font-family:var(--font-body);font-size:16px;padding:14px 16px;transition:border-color 0.2s;outline:none;}
    input:focus,select:focus,textarea:focus{border-color:rgba(201,124,143,0.5);}
    textarea{resize:vertical;min-height:160px;}
    select option{background:var(--aubergine);}
    .submit-btn{background:var(--gold);color:var(--plum);border:none;padding:14px 36px;border-radius:var(--radius-sm);font-family:var(--font-ui);font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
    .submit-btn:hover{background:var(--champagne);}
    footer{background:rgba(28,21,32,0.95);border-top:1px solid rgba(201,124,143,0.08);padding:40px 0 24px;}
    .footer-bottom{font-family:var(--font-ui);font-size:12px;color:rgba(248,241,232,0.25);max-width:1100px;margin:0 auto;padding:0 24px;}
  </style>
</head>
<body>
<nav><div class="nav-inner"><a href="/" class="nav-brand-name">AI Girlfriend Club</a></div></nav>
<main class="content">
  <h1>Contact</h1>
  <p class="intro">Questions about a review, a correction to flag, a story submission, or a press inquiry — use the form below.</p>
  <div class="form-group">
    <label for="subject">Subject</label>
    <select id="subject">
      <option value="">Select a topic</option>
      <option>Review question or correction</option>
      <option>Story submission question</option>
      <option>Affiliate or partnership inquiry</option>
      <option>Press or media inquiry</option>
      <option>Privacy or data request</option>
      <option>Other</option>
    </select>
  </div>
  <div class="form-group">
    <label for="email">Your email</label>
    <input type="email" id="email" placeholder="your@email.com"/>
  </div>
  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" placeholder="Your message..."></textarea>
  </div>
  <button class="submit-btn" onclick="alert('Message sent. We will respond within a few business days.')">Send message</button>
</main>
<footer><div class="footer-bottom">© 2026 AI Girlfriend Club. Independent reviews. No paid placement.</div></footer>
</body>
</html>
